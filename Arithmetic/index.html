<!DOCTYPE html>
<html>
<head>
    <title>Arithmetic</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/arithmetic.js" defer></script>
</head>
<body>
    <div id="wrapper">
        <header>
            <h1>I Heart Arithmetic...</h1>
        </header>

        <form>
            <input id="num1" type="number" value="2">

            <select id="operation">
                <option value="+">+</option>
                <option value="-">-</option>
                <option value="*">*</option>
                <option value="/">/</option>
                <option value="%">%</option>
            </select>

            <input id="num2" type="number" value="2"> =

            <input id="result" type="text" readonly>
        </form>
    </div>
</body>
</html>
