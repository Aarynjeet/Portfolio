<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>addition</title>

    <style>
        .invalid {
            background-color: red;
            border: 5px solid black;
            color: white;
            padding: 10px;
        }
    </style>

    <script>
        function addition() {
            let op1 = Math.floor(Math.random() * 200 - 100);
            let op2 = Math.floor(Math.random() * 200 - 100);

            let result = document.getElementById("result");
            let userAnswer = prompt("What is " + op1 + " + " + op2 + "?");

            // remove invalid class if it was previously added
            result.classList.remove("invalid");

            // invalid input
            if (userAnswer === null || isNaN(userAnswer)) {
                result.innerHTML = "Invalid input";
                result.classList.add("invalid");
                return;
            }

            let correctAnswer = op1 + op2;

            if (parseInt(userAnswer) === correctAnswer) {
                result.innerHTML = "Correct";
                result.style.color = "green";
            } else {
                result.innerHTML = "Incorrect";
                result.style.color = "red";
            }
        }
    </script>
</head>

<body>
    <p>Run <code>addition()</code> from the console.</p>
    <h1 id="result"></h1>
</body>

</html>
